on:
  pull_request:
    types: [edited, synchronize, opened]
  push: 
    branches: [master, main]
  workflow_dispatch:
jobs:
    lint-and-check-formatting:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: "Use node version"
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: 'npm'
            - name: "Install dependencies"
              run: npm install
            - name: "Linting with ESLint"
              run: npm run lint
            - name: Check formatting with Prettier
              run: npm run check-formatting 
    build:
      runs-on: ubuntu-latest
      steps:
          - uses: actions/checkout@v6
          - name: "Use node version"
            uses: actions/setup-node@v6
            with:
                node-version-file: .nvmrc
                cache: 'npm'
          - name: "Install dependencies"
            run: npm install
          - name: "Build"
            run: npm run build
          - name: Archive production artifacts
            uses: actions/upload-artifact@v7
            with:
              name: dist-without-markdown
              path: |
                main.js
    run-tests:
      runs-on: ubuntu-latest
      steps:
          - uses: actions/checkout@v6
          - name: "Use node version"
            uses: actions/setup-node@v6
            with:
                node-version-file: .nvmrc
                cache: 'npm'
          - name: "Install dependencies"
            run: npm install
          - name: Run tests
            run: npm run test
    run-typecheck:
      runs-on: ubuntu-latest
      steps:
          - uses: actions/checkout@v6
          - name: "Use node version"
            uses: actions/setup-node@v6
            with:
                node-version-file: .nvmrc
                cache: 'npm'
          - name: "Install dependencies"
            run: npm install
          - name: Typechecking
            run: npm run typecheck
    e2e-tests:
      runs-on: ubuntu-latest
      needs: build
      steps:
          - uses: actions/checkout@v6
          - name: "Use node version"
            uses: actions/setup-node@v6
            with:
                node-version-file: .nvmrc
                cache: 'npm'
          - name: "Install dependencies"
            run: npm install
          - name: "Build"
            run: npm run build
          - name: "Cache Obsidian"
            uses: actions/cache@v5
            with:
                path: .obsidian-cache
                key: obsidian-cache-${{ runner.os }}-${{ hashFiles('manifest.json') }}
          - name: "Setup virtual display"
            run: |
                sudo rm -rf /etc/apt/sources.list.d/*.list
                echo "set man-db/auto-update false" | sudo debconf-communicate
                sudo dpkg-reconfigure man-db
                sudo apt-get update -q
                sudo apt-get install -q herbstluftwm dzen2 x11-xserver-utils
                export DISPLAY=:99
                echo "DISPLAY=$DISPLAY" >> "$GITHUB_ENV"
                Xvfb $DISPLAY -screen 0 1280x1024x24 +extension GLX -noreset &
                sleep 1
                herbstluftwm &
                sleep 1
          - name: "Run E2E tests"
            run: npm run test:e2e
            env:
                WDIO_MAX_INSTANCES: 2
